<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Absensi Pondok Pro v2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            user-select: none; 
            -webkit-user-select: none;
            touch-action: pan-x pan-y;
            overflow-x: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page { display: none; }
        .page-active { 
            display: block; 
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-active-tab {
            background: white !important;
            color: #064e3b !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="page-absensi" class="page page-active pb-40">
        <header class="bg-emerald-900 text-white p-6 shadow-2xl sticky top-0 z-40 rounded-b-[2.5rem]">
            <div class="container mx-auto max-w-4xl">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h1 class="text-2xl font-extrabold flex items-center gap-2 tracking-tight">
                            <i class="fas fa-mosque text-emerald-400"></i> RAbsensi
                        </h1>
                        <p id="header-date" class="text-emerald-200 text-xs mt-1 font-medium opacity-80"></p>
                    </div>
                    <button onclick="switchPage('page-rekap')" class="bg-white/10 hover:bg-white/20 border border-white/20 px-4 py-2 rounded-2xl text-xs font-bold transition backdrop-blur-md">
                        <i class="fas fa-chart-pie mr-2"></i> Rekap Data
                    </button>
                </div>
                
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="relative">
                            <label class="text-[10px] font-black text-emerald-400 uppercase mb-1 flex items-center gap-2">
                                Kegiatan <button onclick="openActivityModal()" class="text-white hover:text-emerald-300"><i class="fas fa-cog"></i></button>
                            </label>
                            <select id="kegiatan" class="w-full p-3 rounded-xl bg-emerald-800/50 border border-emerald-700 text-white text-sm outline-none appearance-none"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-emerald-400 uppercase mb-1">Tanggal</label>
                            <input type="date" id="input-date" class="w-full p-3 rounded-xl bg-emerald-800/50 border border-emerald-700 text-white text-sm outline-none">
                        </div>
                    </div>
                    <div class="flex items-center gap-2 overflow-x-auto py-2 no-scrollbar">
                        <div id="class-filter" class="flex gap-2"></div>
                        <button onclick="addNewClass()" class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-2xl bg-emerald-500 text-white shadow-lg"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
        </header>

        <main class="container mx-auto p-4 max-w-4xl mt-6">
            <div class="bg-white rounded-[2.5rem] shadow-xl border border-slate-100 overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center bg-gradient-to-r from-slate-50 to-white">
                    <div>
                        <h2 class="font-extrabold text-xl text-slate-800">Kelas <span id="current-class-name" class="text-emerald-600"></span></h2>
                        <p class="text-xs font-medium text-slate-400" id="student-count"></p>
                    </div>
                    <button onclick="addNewStudent()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-2xl text-xs font-bold hover:bg-emerald-700 shadow-md">
                        <i class="fas fa-user-plus mr-1"></i> Santri
                    </button>
                </div>
                <div id="list-container" class="divide-y divide-slate-50"></div>
            </div>
        </main>

        <div class="fixed bottom-8 left-0 right-0 px-6 z-40">
            <div class="container mx-auto max-w-4xl">
                <button onclick="saveCurrentClass()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 rounded-[2rem] shadow-2xl transition-all active:scale-95 flex justify-center items-center gap-3 text-lg">
                    <i class="fas fa-check-circle text-xl"></i> SIMPAN ABSENSI
                </button>
            </div>
        </div>
    </div>

    <div id="page-rekap" class="page bg-slate-50 min-h-screen">
        <nav class="p-6 bg-white border-b sticky top-0 z-50 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-4">
                <button onclick="switchPage('page-absensi')" class="w-10 h-10 rounded-2xl bg-slate-100 flex items-center justify-center hover:bg-emerald-600 hover:text-white transition"><i class="fas fa-chevron-left"></i></button>
                <h2 class="text-xl font-extrabold text-slate-800">Riwayat</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="openPersonalSearch()" class="bg-amber-500 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg flex items-center gap-2">
                    <i class="fas fa-users-viewfinder"></i> Cek Per Santri
                </button>
                <div class="px-4 py-2 bg-emerald-50 rounded-xl border border-emerald-100 text-center">
                    <p class="text-[9px] font-bold text-emerald-600 uppercase">Log</p>
                    <p id="stat-count" class="text-sm font-black text-emerald-800">0</p>
                </div>
            </div>
        </nav>
        <div class="container mx-auto max-w-4xl p-6" id="rekap-container"></div>
    </div>

    <div id="personalModal" class="fixed inset-0 z-[130] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[90vh] animate__animated animate__fadeInUp">
            <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
                <div>
                    <h3 class="font-black text-slate-800">Log Aktivitas Santri</h3>
                    <p class="text-[10px] text-red-500 font-bold uppercase italic">Tombol RESET akan menghapus semua data santri tersebut</p>
                </div>
                <button onclick="closeModal('personalModal')" class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500">&times;</button>
            </div>
            <div class="p-6 border-b bg-white space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <select id="search-class-select" onchange="updateStudentDropdown()" class="w-full bg-slate-100 border-none px-4 py-4 rounded-2xl text-xs outline-none focus:ring-2 focus:ring-amber-500 font-bold appearance-none">
                        <option value="">Pilih Kelas</option>
                    </select>
                    <select id="search-student-select" onchange="processPersonalSearch()" class="w-full bg-slate-100 border-none px-4 py-4 rounded-2xl text-xs outline-none focus:ring-2 focus:ring-amber-500 font-bold appearance-none">
                        <option value="">Pilih Santri</option>
                    </select>
                </div>
                <div id="personal-stats" class="grid grid-cols-4 gap-2 hidden">
                    <div class="bg-emerald-50 p-2 rounded-xl border border-emerald-100 text-center"><p class="text-[8px] font-bold text-emerald-600">H</p><p id="stat-h" class="text-xs font-black">0</p></div>
                    <div class="bg-amber-50 p-2 rounded-xl border border-amber-100 text-center"><p class="text-[8px] font-bold text-amber-600">I</p><p id="stat-i" class="text-xs font-black">0</p></div>
                    <div class="bg-blue-50 p-2 rounded-xl border border-blue-100 text-center"><p class="text-[8px] font-bold text-blue-600">S</p><p id="stat-s" class="text-xs font-black">0</p></div>
                    <div class="bg-red-50 p-2 rounded-xl border border-red-100 text-center"><p class="text-[8px] font-bold text-red-600">A</p><p id="stat-a" class="text-xs font-black">0</p></div>
                </div>
            </div>
            <div id="personal-result-list" class="flex-1 overflow-y-auto p-4 space-y-2 no-scrollbar bg-slate-50/50"></div>
        </div>
    </div>

    <div id="activityModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
                <h3 class="font-black text-slate-800">Daftar Kegiatan</h3>
                <button onclick="closeModal('activityModal')" class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-500">&times;</button>
            </div>
            <div class="p-6">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="new-act-input" placeholder="Nama kegiatan..." class="flex-1 bg-slate-100 border-none p-4 rounded-2xl text-sm outline-none">
                    <button onclick="addActivity()" class="bg-emerald-600 text-white px-6 rounded-2xl font-bold text-sm">Tambah</button>
                </div>
                <div id="activity-list" class="space-y-2 max-h-[40vh] overflow-y-auto pr-2 no-scrollbar"></div>
            </div>
        </div>
    </div>

    <div id="folderModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-6 border-b bg-emerald-900 text-white flex justify-between items-center"><div id="folder-header"></div><button onclick="closeModal('folderModal')" class="text-2xl">&times;</button></div>
            <div id="folder-content" class="p-4 overflow-y-auto divide-y divide-slate-100"></div>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 z-[120] hidden flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="p-6 border-b bg-slate-50 flex justify-between items-center"><div id="detail-header-text"></div><button onclick="closeModal('detailModal')" class="text-slate-400 text-2xl">&times;</button></div>
            <div class="p-4 overflow-y-auto max-h-[60vh]" id="detail-content"></div>
        </div>
    </div>

    <script>
        const defaultSantri = { "Al-Miftah": ["Zaidan", "Ahmad", "Budi", "Yusuf"], "Kelas 1": ["Fatimah", "Ali", "Zahra"] };
        const defaultKegiatan = ["Ngaji Kitab", "Shalat Berjamaah", "Tahfidz Pagi"];

        let db_santri = JSON.parse(localStorage.getItem('db_santri')) || defaultSantri;
        let db_kegiatan = JSON.parse(localStorage.getItem('db_kegiatan')) || defaultKegiatan;
        let currentKelas = Object.keys(db_santri)[0] || "";

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('input-date').value = today;
            document.getElementById('header-date').innerText = formatTgl(today);
            initApp();
        });

        function initApp() {
            sortAllSantri(); renderActivityOptions(); renderClassTabs(); renderSantriList();
        }

        function sortAllSantri() { Object.keys(db_santri).forEach(kls => db_santri[kls].sort((a, b) => a.localeCompare(b))); }
        function saveDb() { localStorage.setItem('db_santri', JSON.stringify(db_santri)); localStorage.setItem('db_kegiatan', JSON.stringify(db_kegiatan)); }
        function switchPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById(id).classList.add('page-active');
            if(id === 'page-rekap') renderRekapPage();
            window.scrollTo(0,0);
        }
        function formatTgl(iso) { return new Date(iso).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); }

        function renderActivityOptions() { document.getElementById('kegiatan').innerHTML = db_kegiatan.map(k => `<option value="${k}">${k}</option>`).join(''); }
        function openActivityModal() { document.getElementById('activityModal').classList.remove('hidden'); renderActivityList(); }
        function renderActivityList() {
            document.getElementById('activity-list').innerHTML = db_kegiatan.map((k, i) => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <span class="text-sm font-bold text-slate-700">${k}</span>
                    <button onclick="deleteActivity(${i})" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }
        function addActivity() {
            const input = document.getElementById('new-act-input');
            if(input.value.trim()) { db_kegiatan.push(input.value.trim()); input.value = ''; saveDb(); renderActivityOptions(); renderActivityList(); }
        }
        function deleteActivity(i) { if(confirm('Hapus kegiatan?')) { db_kegiatan.splice(i, 1); saveDb(); renderActivityOptions(); renderActivityList(); } }

        function renderClassTabs() {
            const container = document.getElementById('class-filter');
            container.innerHTML = Object.keys(db_santri).map(kls => `
                <div class="relative group">
                    <button onclick="switchClass('${kls}')" class="px-6 py-2.5 rounded-2xl whitespace-nowrap font-bold text-sm transition-all shadow-sm ${kls === currentKelas ? 'btn-active-tab ring-2 ring-emerald-500' : 'bg-emerald-800/50 text-emerald-200'}">
                        ${kls}
                    </button>
                    <button onclick="deleteClass('${kls}')" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white rounded-full text-[10px] flex items-center justify-center opacity-0 group-hover:opacity-100 transition border-2 border-white"><i class="fas fa-times"></i></button>
                </div>
            `).join('');
        }
        function switchClass(kls) { currentKelas = kls; renderClassTabs(); renderSantriList(); }
        
        function renderSantriList() {
            document.getElementById('current-class-name').innerText = currentKelas || "---";
            const container = document.getElementById('list-container');
            const santris = db_santri[currentKelas] || [];
            document.getElementById('student-count').innerText = `${santris.length} Santri`;
            if(!currentKelas) { container.innerHTML = `<p class="p-20 text-center text-slate-400">Tambah kelas dulu</p>`; return; }
            container.innerHTML = santris.map((nama, idx) => `
                <div class="p-4 flex items-center justify-between group hover:bg-slate-50 transition-all animate__animated animate__fadeInUp" style="animation-delay: ${idx * 0.03}s">
                    <div class="flex items-center gap-4">
                        <button onclick="deleteStudent(${idx})" class="text-slate-200 hover:text-red-500 transition opacity-0 group-hover:opacity-100"><i class="fas fa-trash-alt text-xs"></i></button>
                        <span class="font-bold text-slate-700 text-sm">${nama}</span>
                    </div>
                    <div class="flex gap-1.5">
                        ${['H', 'I', 'S', 'A'].map(st => `
                            <label class="cursor-pointer">
                                <input type="radio" name="r-${currentKelas}-${idx}" value="${st}" class="hidden peer">
                                <div class="w-10 h-10 flex items-center justify-center rounded-xl border-2 border-slate-100 font-black transition-all peer-checked:bg-emerald-600 peer-checked:text-white text-slate-300 text-[11px]">${st}</div>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function addNewClass() { const n = prompt("Nama Kelas:"); if(n && n.trim()) { db_santri[n.trim()] = []; currentKelas = n.trim(); saveDb(); initApp(); } }
        function deleteClass(kls) { if(confirm(`Hapus Kelas ${kls}?`)) { delete db_santri[kls]; currentKelas = Object.keys(db_santri)[0] || ""; saveDb(); initApp(); } }
        function addNewStudent() { if(!currentKelas) return alert("Pilih kelas"); const n = prompt("Nama Santri:"); if(n && n.trim()) { db_santri[currentKelas].push(n.trim()); saveDb(); initApp(); } }
        function deleteStudent(i) { if(confirm('Hapus santri?')) { db_santri[currentKelas].splice(i, 1); saveDb(); renderSantriList(); } }

        function saveCurrentClass() {
            const keg = document.getElementById('kegiatan').value;
            const tgl = document.getElementById('input-date').value;
            const santris = db_santri[currentKelas];
            if(!currentKelas || !santris?.length) return alert("Data kosong");

            const timestamp = Date.now();
            let res = santris.map((nama, i) => {
                const sel = document.querySelector(`input[name="r-${currentKelas}-${i}"]:checked`);
                return { nama, status: sel ? sel.value : 'T/D' };
            });

            let history = JSON.parse(localStorage.getItem('absensi_history') || '{}');
            let personal = JSON.parse(localStorage.getItem('personal_full_history') || '[]');

            if(!history[tgl]) history[tgl] = {};
            if(!history[tgl][keg]) history[tgl][keg] = {};
            history[tgl][keg][currentKelas] = res;
            
            res.forEach((item, idx) => personal.push({ 
                id: timestamp + idx, 
                tgl, keg, kls: currentKelas, 
                nama: item.nama, 
                status: item.status 
            }));

            localStorage.setItem('absensi_history', JSON.stringify(history));
            localStorage.setItem('personal_full_history', JSON.stringify(personal));
            alert(`Berhasil Simpan ${currentKelas}!`);
        }

        function renderRekapPage() {
            const container = document.getElementById('rekap-container');
            const history = JSON.parse(localStorage.getItem('absensi_history') || '{}');
            const dates = Object.keys(history).sort().reverse();
            let totalLog = 0;
            dates.forEach(d => Object.keys(history[d]).forEach(k => totalLog += Object.keys(history[d][k]).length));
            document.getElementById('stat-count').innerText = totalLog;
            if(!dates.length) { container.innerHTML = `<div class="text-center py-20 text-slate-300 italic font-bold">Belum ada riwayat</div>`; return; }
            container.innerHTML = dates.map(tgl => `
                <div class="mb-8 animate__animated animate__fadeIn">
                    <div class="flex items-center gap-4 mb-4">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-white px-3 py-1 rounded-full border border-slate-100 shadow-sm">${formatTgl(tgl)}</span>
                        <div class="h-px flex-1 bg-slate-200"></div>
                    </div>
                    <div class="space-y-3">
                        ${Object.keys(history[tgl]).map(keg => `
                            <div class="group bg-white p-4 rounded-3xl border border-slate-100 flex justify-between items-center hover:shadow-xl transition-all cursor-pointer">
                                <div class="flex items-center gap-4" onclick="openFolder('${tgl}', '${keg}')">
                                    <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-600"><i class="fas fa-folder-open text-xl"></i></div>
                                    <div>
                                        <h4 class="font-black text-slate-800 leading-tight">${keg}</h4>
                                        <p class="text-[10px] text-slate-400 font-bold">${Object.keys(history[tgl][keg]).length} Kelas Tersimpan</p>
                                    </div>
                                </div>
                                <button onclick="deleteHistoryKegiatan('${tgl}', '${keg}')" class="w-10 h-10 rounded-xl bg-red-50 text-red-400 hover:bg-red-500 hover:text-white transition opacity-0 group-hover:opacity-100"><i class="fas fa-trash-alt text-xs"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // --- FITUR PERSONAL & RESET (KEMBALI) ---
        function openPersonalSearch() {
            document.getElementById('personalModal').classList.remove('hidden');
            const select = document.getElementById('search-class-select');
            select.innerHTML = '<option value="">Pilih Kelas</option>' + Object.keys(db_santri).map(kls => `<option value="${kls}">${kls}</option>`).join('');
            document.getElementById('search-student-select').innerHTML = '<option value="">Pilih Santri</option>';
            document.getElementById('personal-result-list').innerHTML = '<div class="text-center py-10 text-slate-300 italic text-sm">Pilih data untuk melihat riwayat...</div>';
            document.getElementById('personal-stats').classList.add('hidden');
        }

        function updateStudentDropdown() {
            const kls = document.getElementById('search-class-select').value;
            const studentSelect = document.getElementById('search-student-select');
            if(!kls) { studentSelect.innerHTML = '<option value="">Pilih Santri...</option>'; return; }
            studentSelect.innerHTML = '<option value="">Pilih Santri...</option>' + db_santri[kls].map(s => `<option value="${s}">${s}</option>`).join('');
        }

        function processPersonalSearch() {
            const klsQuery = document.getElementById('search-class-select').value;
            const nameQuery = document.getElementById('search-student-select').value;
            const resultContainer = document.getElementById('personal-result-list');
            const statsContainer = document.getElementById('personal-stats');
            if(!klsQuery || !nameQuery) return;

            const personalFull = JSON.parse(localStorage.getItem('personal_full_history') || '[]');
            let found = personalFull.filter(item => item.kls === klsQuery && item.nama === nameQuery);
            let stats = { H:0, I:0, S:0, A:0, 'T/D':0 };

            if(found.length > 0) {
                statsContainer.classList.remove('hidden');
                found.forEach(f => stats[f.status || 'T/D']++);
                document.getElementById('stat-h').innerText = stats.H;
                document.getElementById('stat-i').innerText = stats.I;
                document.getElementById('stat-s').innerText = stats.S;
                document.getElementById('stat-a').innerText = stats.A;

                const colors = { H: 'bg-emerald-50 text-emerald-700', I: 'bg-amber-50 text-amber-700', S: 'bg-blue-50 text-blue-700', A: 'bg-red-50 text-red-700', 'T/D': 'bg-slate-200 text-slate-600' };
                resultContainer.innerHTML = `
                    <button onclick="resetIndividualSantri('${nameQuery}', '${klsQuery}')" class="w-full mb-4 bg-red-50 text-red-500 py-3 rounded-2xl text-[10px] font-black border border-red-100 active:bg-red-500 active:text-white transition shadow-sm">
                        <i class="fas fa-undo mr-2"></i> RESET SELURUH RIWAYAT ${nameQuery.toUpperCase()}
                    </button>
                ` + found.reverse().map(item => `
                    <div class="p-4 bg-white rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm group animate__animated animate__fadeInUp">
                        <div>
                            <p class="text-[9px] text-slate-500">${formatTgl(item.tgl)}</p>
                            <p class="text-[10px] font-black text-amber-600 uppercase">${item.keg}</p>
                        </div>
                        <div class="flex items-center gap-2">
                             <button onclick="deletePersonalLog(${item.id || 0})" class="text-slate-200 hover:text-red-500 transition px-2"><i class="fas fa-trash-alt text-xs"></i></button>
                            <span class="text-[9px] font-black px-3 py-1.5 rounded-lg ${colors[item.status || 'T/D']} min-w-[35px] text-center">${item.status || 'T/D'}</span>
                        </div>
                    </div>
                `).join('');
            } else {
                statsContainer.classList.add('hidden');
                resultContainer.innerHTML = '<div class="text-center py-10 text-slate-300 italic">Belum ada riwayat untuk santri ini</div>';
            }
        }

        function resetIndividualSantri(nama, kls) {
            if(confirm(`Hapus SELURUH riwayat aktivitas untuk santri "${nama}" di kelas ${kls}?`)) {
                let personal = JSON.parse(localStorage.getItem('personal_full_history') || '[]');
                personal = personal.filter(p => !(p.nama === nama && p.kls === kls));
                localStorage.setItem('personal_full_history', JSON.stringify(personal));
                processPersonalSearch();
            }
        }

        function deletePersonalLog(id) {
            if(!id) return;
            if(confirm("Hapus log tunggal ini?")) {
                let personal = JSON.parse(localStorage.getItem('personal_full_history') || '[]');
                personal = personal.filter(p => p.id !== id);
                localStorage.setItem('personal_full_history', JSON.stringify(personal));
                processPersonalSearch();
            }
        }

        function deleteHistoryKegiatan(tgl, keg) {
            if(confirm(`Hapus seluruh riwayat ${keg} pada tanggal ini?`)) {
                let history = JSON.parse(localStorage.getItem('absensi_history') || '{}');
                delete history[tgl][keg];
                if(Object.keys(history[tgl]).length === 0) delete history[tgl];
                localStorage.setItem('absensi_history', JSON.stringify(history));
                renderRekapPage();
            }
        }

        function openFolder(tgl, keg) {
            const history = JSON.parse(localStorage.getItem('absensi_history') || '{}');
            const kelasData = history[tgl][keg];
            document.getElementById('folder-header').innerHTML = `<h3 class="font-black">${keg}</h3><p class="text-[10px] opacity-70">${formatTgl(tgl)}</p>`;
            document.getElementById('folder-content').innerHTML = Object.entries(kelasData).map(([kls, s]) => {
                const h = s.filter(x => x.status === 'H').length;
                return `<div class="py-4 flex justify-between items-center hover:bg-slate-50 px-2 rounded-xl transition cursor-pointer" onclick="openDetail('${tgl}', '${keg}', '${kls}')">
                        <div><p class="font-black text-slate-800 text-sm">Kelas ${kls}</p><p class="text-[10px] text-slate-400">${s.length} Santri</p></div>
                        <div class="text-right flex items-center gap-3"><div><p class="text-emerald-600 font-black text-xs">${h} Hadir</p><p class="text-[9px] text-red-400 font-bold">${s.length - h} Absen</p></div><i class="fas fa-chevron-right text-slate-300"></i></div>
                    </div>`;
            }).join('');
            document.getElementById('folderModal').classList.remove('hidden');
        }

        function openDetail(tgl, keg, kls) {
            const history = JSON.parse(localStorage.getItem('absensi_history') || '{}');
            const data = history[tgl][keg][kls];
            document.getElementById('detail-header-text').innerHTML = `<h4 class="font-black text-slate-800">Kelas ${kls}</h4><p class="text-[10px] font-bold text-emerald-600 uppercase">${keg} | ${tgl}</p>`;
            const colors = { H: 'bg-emerald-100 text-emerald-700', I: 'bg-amber-100 text-amber-700', S: 'bg-blue-100 text-blue-700', A: 'bg-red-100 text-red-700', 'T/D': 'bg-slate-100 text-slate-500' };
            document.getElementById('detail-content').innerHTML = data.map(s => `<div class="flex justify-between items-center py-4 border-b border-slate-50 last:border-0"><span class="text-sm font-bold text-slate-700">${s.nama}</span><span class="text-[10px] font-black px-3 py-1.5 rounded-xl uppercase ${colors[s.status]}">${s.status}</span></div>`).join('');
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
</html>
