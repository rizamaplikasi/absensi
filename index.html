<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Photo Web</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; flex-direction: column; }
        #video { width: 100%; height: 80vh; object-fit: cover; }
        
        .controls { height: 20vh; display: flex; justify-content: center; align-items: center; gap: 20px; }
        #capture-btn { width: 70px; height: 70px; border-radius: 50%; background: white; border: 4px solid #333; }
        
        /* Hasil Live Photo */
        #result-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; }
        #live-result { width: 100%; height: 90%; object-fit: contain; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>

    <div class="controls">
        <button id="capture-btn"></button>
    </div>

    <div id="result-container">
        <video id="live-result" loop playsinline></video>
        <button onclick="closeResult()" style="width: 100%; padding: 20px;">Tutup</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const liveResult = document.getElementById('live-result');
        const resultContainer = document.getElementById('result-container');
        let mediaRecorder;
        let recordedChunks = [];

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                liveResult.src = URL.createObjectURL(blob);
                resultContainer.style.display = 'block';
                recordedChunks = [];
            };
        }

        document.getElementById('capture-btn').onclick = () => {
            mediaRecorder.start();
            // Rekam durasi 1.5 detik (durasi khas Live Photo)
            setTimeout(() => mediaRecorder.stop(), 1500);
        };

        function closeResult() {
            resultContainer.style.display = 'none';
        }

        init();
    </script>
</body>
</html>
