<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>iOS Style Camera</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #video { width: 100%; max-width: 500px; transform: scaleX(-1); border-radius: 20px; }
        
        /* Efek Flash ala iPhone */
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none;
            transition: opacity 0.1s ease-out;
            z-index: 10;
        }
        .flash-active { opacity: 0.8 !important; }

        .controls { position: absolute; bottom: 30px; display: flex; gap: 20px; }
        button { padding: 15px 25px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="flash-overlay"></div>
    <video id="video" autoplay playsinline></video>

    <div class="controls">
        <button id="toggleFlash">Flash: OFF</button>
        <button id="capture">📸</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const flashOverlay = document.getElementById('flash-overlay');
        const toggleFlashBtn = document.getElementById('toggleFlash');
        let flashEnabled = false;

        // Akses Kamera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
            .then(stream => { video.srcObject = stream; });

        toggleFlashBtn.onclick = () => {
            flashEnabled = !flashEnabled;
            toggleFlashBtn.innerText = flashEnabled ? "Flash: ON" : "Flash: OFF";
        };

        document.getElementById('capture').onclick = () => {
            if (flashEnabled) {
                // Simulasi Flash iOS (terang tajam lalu memudar)
                flashOverlay.classList.add('flash-active');
                setTimeout(() => flashOverlay.classList.remove('flash-active'), 150);
            }
            // Logika capture foto di sini...
            alert("Foto berhasil diambil dengan efek smooth!");
        };
    </script>
</body>
</html>
